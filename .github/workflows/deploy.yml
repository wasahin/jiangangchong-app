name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FEISHU_APP_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          NEXT_PUBLIC_FEISHU_BASE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_BASE_ID }}
          NEXT_PUBLIC_FEISHU_TABLE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_TABLE_ID }}
          NEXT_PUBLIC_STAFF_PASSWORD: ${{ secrets.NEXT_PUBLIC_STAFF_PASSWORD }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Verify build output
        run: |
          echo "=== 验证构建产物 ==="
          if [ ! -d "out" ]; then
            echo "::error::out 目录不存在!"
            exit 1
          fi
          FILE_COUNT=$(find out -type f | wc -l)
          echo "文件总数: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::out 目录为空!"
            exit 1
          fi
          echo "✓ 构建产物验证通过"

      - name: Copy Functions to Build Output
        run: |
          echo "=== 复制 Functions ==="
          if [ -d "functions" ]; then
            cp -r functions out/functions
            echo "✓ Functions copied"
          else
            echo "⚠️ functions 目录不存在"
          fi

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== 部署到 Cloudflare Pages ==="
          wrangler pages deploy out --project-name jiangangchong-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Cloudflare Pages 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 仓库 | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "访问地址: https://jiangangchong-app.pages.dev" >> $GITHUB_STEP_SUMMARY
