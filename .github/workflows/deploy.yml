name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发, 便于排查问题

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ============================================================
      # 1. 环境诊断 - 打印关键环境信息, 便于排查兼容性问题
      # ============================================================
      - name: Environment diagnostics
        run: |
          echo "=== 环境信息 ==="
          echo "Node.js 版本: $(node --version)"
          echo "npm 版本: $(npm --version)"
          echo "操作系统: $(uname -a)"
          echo "当前目录: $(pwd)"
          echo ""
          echo "=== Git 信息 ==="
          echo "Commit: $(git rev-parse HEAD)"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Author: $(git log -1 --pretty=format:'%an <%ae>')"
          echo "Message: $(git log -1 --pretty=format:'%s')"
          echo ""
          echo "=== 项目文件结构 ==="
          ls -la
          echo ""
          echo "=== package.json scripts ==="
          cat package.json | jq '.scripts' || cat package.json

      - name: Install dependencies
        run: npm ci

      # ============================================================
      # 2. 构建 Next.js
      # ============================================================
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FEISHU_APP_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          NEXT_PUBLIC_FEISHU_BASE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_BASE_ID }}
          NEXT_PUBLIC_FEISHU_TABLE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_TABLE_ID }}
          NEXT_PUBLIC_STAFF_PASSWORD: ${{ secrets.NEXT_PUBLIC_STAFF_PASSWORD }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      # ============================================================
      # 3. 构建产物验证 - 确保输出目录存在且包含文件
      # ============================================================
      - name: Verify build output
        id: verify_build
        run: |
          echo "=== 验证构建产物 ==="
          OUTPUT_DIR=".vercel/output/static"
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "::error::构建输出目录 $OUTPUT_DIR 不存在!"
            echo "::error::请检查 @cloudflare/next-on-pages 是否正确配置"
            echo ""
            echo "=== 当前目录结构 (前 3 层) ==="
            find . -maxdepth 3 -type d -not -path '*/node_modules*' -not -path '*/.git*' | head -50
            exit 1
          fi
          FILE_COUNT=$(find "$OUTPUT_DIR" -type f | wc -l)
          echo "构建输出目录: $OUTPUT_DIR"
          echo "文件总数: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::构建输出目录为空!"
            exit 1
          fi
          echo ""
          echo "=== 输出目录结构 ==="
          ls -la "$OUTPUT_DIR"
          echo ""
          echo "=== 输出文件列表 (前 20 个) ==="
          find "$OUTPUT_DIR" -type f | head -20
          echo ""
          echo "=== _worker.js 是否存在 ==="
          if [ -f "$OUTPUT_DIR/_worker.js" ]; then
            echo "✓ _worker.js 存在 ($(du -h "$OUTPUT_DIR/_worker.js" | cut -f1))"
          else
            echo "⚠ _worker.js 不存在 (可能是静态站点)"
          fi
          echo ""
          echo "构建产物验证通过 ✓"

      # ============================================================
      # 4. 安装 Wrangler 并验证
      # ============================================================
      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Verify Wrangler installation
        run: |
          echo "=== Wrangler 版本信息 ==="
          wrangler --version
          echo ""
          echo "=== Wrangler 安装位置 ==="
          which wrangler
          echo ""
          echo "=== 验证 Cloudflare 凭证 ==="
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret 未设置!"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret 未设置!"
            exit 1
          fi
          echo "✓ 凭证已配置"
          echo "Account ID 前缀: $(echo $CLOUDFLARE_ACCOUNT_ID | cut -c1-8)..."

      # ============================================================
      # 5. 创建 Cloudflare Pages 项目 (如果不存在)
      # ============================================================
      - name: Try to create Cloudflare Pages project if it doesn't exist
        id: create_project
        run: |
          echo "=== 创建 Pages 项目 (如果不存在) ==="
          if wrangler pages project create jingangchong-app --production-branch main 2>&1; then
            echo "✓ 项目创建成功"
            echo "project_created=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ 项目可能已存在, 继续部署..."
            echo "project_created=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ============================================================
      # 6. 设置 Node.js 兼容性标志 (解决 nodejs_compat 错误)
      # ============================================================
      - name: Set Node.js compatibility flags
        run: |
          echo "=== 设置 Node.js 兼容性标志 ==="
          echo "Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Project: jingangchong-app"
          echo ""
          # 使用 Cloudflare API 设置兼容性标志
          RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/jingangchong-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "compatibility_flags": ["nodejs_compat"],
              "compatibility_date": "2024-09-23",
              "production_branch": "main"
            }')
          echo "API 响应: $RESPONSE"
          echo ""
          # 检查响应是否成功
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            echo "✓ 兼容性标志设置成功"
          else
            ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message')
            echo "⚠ 设置可能失败: $ERROR"
            echo "ℹ 如果项目已存在且标志已设置, 这是正常的"
          fi

      # ============================================================
      # 7. 部署到 Cloudflare Pages - 使用 debug 日志级别
      # ============================================================
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          echo "=== 部署到 Cloudflare Pages ==="
          echo "项目名: jingangchong-app"
          echo "部署目录: .vercel/output/static"
          echo ""
          # 使用 tee 同时输出到控制台和日志文件
          set +e
          wrangler pages deploy .vercel/output/static --project-name jingangchong-app 2>&1 | tee deploy.log
          DEPLOY_EXIT=$?
          set -e
          echo ""
          echo "=== 部署日志已保存到 deploy.log ==="
          echo ""
          if [ $DEPLOY_EXIT -ne 0 ]; then
            echo "::error::部署失败, 退出码: $DEPLOY_EXIT"
            echo ""
            echo "=== 完整部署日志 ==="
            cat deploy.log
            exit 1
          fi
          echo "✓ 部署成功"
          # 提取部署 URL
          DEPLOY_URL=$(grep -oP 'https://[a-z0-9.-]+\.pages\.dev' deploy.log | head -1)
          echo "deployment_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "部署 URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug # 启用 wrangler debug 日志

      # ============================================================
      # 7. 部署后验证 - 检查 URL 是否可访问
      # ============================================================
      - name: Verify deployment
        if: success() && steps.deploy.outputs.deployment_url
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deployment_url }}"
          echo "=== 验证部署可访问性 ==="
          echo "URL: $DEPLOY_URL"
          echo ""
          echo "等待 10 秒让 CDN 同步..."
          sleep 10
          echo ""
          echo "=== HTTP 响应头 ==="
          HTTP_STATUS=$(curl -sI -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "failed")
          echo "HTTP 状态码: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✓ 部署可访问 (HTTP $HTTP_STATUS)"
          else
            echo "⚠ 部署可能有问题 (HTTP $HTTP_STATUS)"
            echo ""
            echo "=== 完整响应头 ==="
            curl -sI "$DEPLOY_URL"
          fi

      # ============================================================
      # 8. 失败处理 - 收集所有诊断信息
      # ============================================================
      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "========================================"
          echo "❌ 部署失败 - 收集诊断信息"
          echo "========================================"
          echo ""
          echo "=== 失败步骤信息 ==="
          echo "失败的步骤会在上方的红色错误中显示"
          echo ""
          echo "=== wrangler 日志目录 ==="
          if [ -d "/home/runner/.config/.wrangler/logs" ]; then
            echo "找到 wrangler 日志目录:"
            ls -la /home/runner/.config/.wrangler/logs/
            echo ""
            echo "=== 最近的 wrangler 日志 ==="
            LATEST_LOG=$(ls -t /home/runner/.config/.wrangler/logs/*.log 2>/dev/null | head -1)
            if [ -n "$LATEST_LOG" ]; then
              echo "日志文件: $LATEST_LOG"
              echo "---"
              cat "$LATEST_LOG" | tail -100
            fi
          else
            echo "未找到 wrangler 日志目录"
          fi
          echo ""
          echo "=== 部署日志 (如果存在) ==="
          if [ -f "deploy.log" ]; then
            cat deploy.log
          else
            echo "部署日志不存在 (部署步骤可能未执行)"
          fi
          echo ""
          echo "=== 构建产物状态 ==="
          if [ -d ".vercel/output/static" ]; then
            echo "构建输出目录存在"
            find .vercel/output/static -type f | wc -l
            echo "个文件"
          else
            echo "构建输出目录不存在"
          fi
          echo ""
          echo "=== 排查建议 ==="
          echo "1. 检查 Cloudflare API Token 权限 (需要 Cloudflare Pages: Edit)"
          echo "2. 检查 Account ID 是否正确"
          echo "3. 查看 https://dash.cloudflare.com → Pages → jingangchong-app"
          echo "4. 检查 GitHub Secrets 是否正确配置"
          echo "5. 查看完整的 wrangler 日志 (上方)"

      # ============================================================
      # 9. 部署摘要 - 输出到 GitHub Actions Summary
      # ============================================================
      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Cloudflare Pages 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 仓库 | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| Wrangler | $(wrangler --version 2>/dev/null || echo 'N/A') |" >> $GITHUB_STEP_SUMMARY
          echo "| 项目创建 | ${{ steps.create_project.outputs.project_created || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deploy.outputs.deployment_url }}" != "" ]; then
            echo "| 部署 URL | [${{ steps.deploy.outputs.deployment_url }}](${{ steps.deploy.outputs.deployment_url }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ 部署成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "访问地址: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ 部署失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看上方的错误日志和诊断信息" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**排查步骤:**" >> $GITHUB_STEP_SUMMARY
            echo "1. 查看 'Collect diagnostics on failure' 步骤的输出" >> $GITHUB_STEP_SUMMARY
            echo "2. 检查 Cloudflare Dashboard → Pages 项目状态" >> $GITHUB_STEP_SUMMARY
            echo "3. 验证 GitHub Secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID)" >> $GITHUB_STEP_SUMMARY
          fi
