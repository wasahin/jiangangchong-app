name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Environment diagnostics
        run: |
          echo "=== 环境信息 ==="
          echo "Node.js 版本: $(node --version)"
          echo "npm 版本: $(npm --version)"
          echo "操作系统: $(uname -a)"
          echo "当前目录: $(pwd)"
          echo ""
          echo "=== Git 信息 ==="
          echo "Commit: $(git rev-parse HEAD)"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FEISHU_APP_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          NEXT_PUBLIC_FEISHU_BASE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_BASE_ID }}
          NEXT_PUBLIC_FEISHU_TABLE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_TABLE_ID }}
          NEXT_PUBLIC_STAFF_PASSWORD: ${{ secrets.NEXT_PUBLIC_STAFF_PASSWORD }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Verify build output
        run: |
          echo "=== 验证构建产物 ==="
          if [ ! -d "out" ]; then
            echo "::error::out 目录不存在!"
            exit 1
          fi
          FILE_COUNT=$(find out -type f | wc -l)
          echo "文件总数: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::out 目录为空!"
            exit 1
          fi
          echo "✓ 构建产物验证通过"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Verify Wrangler installation
        run: |
          echo "=== Wrangler 版本信息 ==="
          wrangler --version

      - name: Copy Functions to Build Output
        run: |
          echo "=== 复制 Functions 到构建产物 ==="
          cp -r functions out/functions || echo "functions 目录不存在"
          ls -la out/functions/api/bookings/

      - name: Set nodejs_compat flag via Cloudflare API
        run: |
          echo "=== 设置 nodejs_compat 兼容性标志 ==="
          curl -X PATCH "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/jingangchong-app" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"functions": {"compatibility_flags": ["nodejs_compat"]}}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== 部署到 Cloudflare Pages ==="
          wrangler pages deploy out --project-name jingangchong-app --compatibility-flags=nodejs_compat
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_FEISHU_APP_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          NEXT_PUBLIC_FEISHU_BASE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_BASE_ID }}
          NEXT_PUBLIC_FEISHU_TABLE_ID: ${{ secrets.NEXT_PUBLIC_FEISHU_TABLE_ID }}

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Cloudflare Pages 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 仓库 | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ 部署成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "访问地址: https://jiangangchong-app.pages.dev" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ 部署失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看上方的错误日志" >> $GITHUB_STEP_SUMMARY
          fi
