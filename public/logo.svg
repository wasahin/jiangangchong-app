<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB333"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
    <filter id="glitter">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="400" height="400" rx="200" fill="url(#amberGrad)"/>
  
  <g filter="url(#shadow)">
    <ellipse cx="150" cy="200" rx="45" ry="65" fill="url(#goldGrad)" stroke="#4A3728" stroke-width="6"/>
    <ellipse cx="250" cy="200" rx="45" ry="65" fill="url(#goldGrad)" stroke="#4A3728" stroke-width="6"/>
    <ellipse cx="130" cy="280" rx="50" ry="40" fill="url(#goldGrad)" stroke="#4A3728" stroke-width="6"/>
    <ellipse cx="270" cy="280" rx="50" ry="40" fill="url(#goldGrad)" stroke="#4A3728" stroke-width="6"/>
    
    <path d="M200 180 Q160 220 150 260 Q145 290 170 310 Q200 330 200 330 Q200 330 230 310 Q255 290 250 260 Q240 220 200 180" fill="url(#goldGrad)" stroke="#4A3728" stroke-width="6"/>
    
    <ellipse cx="150" cy="200" rx="20" ry="35" fill="#FFE082" opacity="0.4"/>
    <ellipse cx="250" cy="200" rx="20" ry="35" fill="#FFE082" opacity="0.4"/>
    <ellipse cx="130" cy="280" rx="25" ry="18" fill="#FFE082" opacity="0.4"/>
    <ellipse cx="270" cy="280" rx="25" ry="18" fill="#FFE082" opacity="0.4"/>
    <ellipse cx="200" cy="270" rx="35" ry="25" fill="#FFE082" opacity="0.4"/>
  </g>
  
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4A3728" text-anchor="middle">金刚宠</text>
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="14" fill="#4A3728" opacity="0.7" text-anchor="middle">MODERN PET CARE SOLUTIONS</text>
</svg>
